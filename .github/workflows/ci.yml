name: "Build and Plan"

on:
  pull_request:
    types: [opened, synchronize, reopened]

env:
  IMAGE_LIST: ${{ vars.NODE_IMAGE }}
  NODE_VERSION: ${{ vars.NODE_VERSION }}
  REGION: ${{ vars.REGION }}

jobs:
  build-job:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: CI - Build Verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.12.0

      - name: Install PNPM
        run: |
          npm install -g pnpm

      - name: Install dependencies
        run: |
          pnpm install

      - name: Run Build
        run: |
          mv prisma.config.ts prisma.config.ts.bak
          pnpm run build
